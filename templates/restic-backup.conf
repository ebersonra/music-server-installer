# restic-backup.conf — Backup versionado + criptografado (restic)
# Instalado em: /var/lib/music-server-installer/restic-backup.conf

# Repositório restic (exemplos):
#   /mnt/backup-disk/restic-repo
#   rclone:gdrive:restic-music-server
#   sftp:usuario@host:/path/restic
RESTIC_REPOSITORY=""

# Arquivo com a senha do repositório (chmod 600)
RESTIC_PASSWORD_FILE="/var/lib/music-server-installer/restic.password"

# O que incluir
BACKUP_MUSIC=true
BACKUP_PHOTOS=true
BACKUP_DOWNLOADS=false

# Retenção (forget + prune)
KEEP_DAILY=7
KEEP_WEEKLY=4
KEEP_MONTHLY=6
KEEP_YEARLY=2

# Agendamento
BACKUP_SCHEDULE="*-*-* 04:00:00"

# Logs
BACKUP_LOG_DIR="/var/lib/music-server-installer/logs"
