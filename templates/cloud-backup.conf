# cloud-backup.conf — Backup compacto do HD → nuvem (rclone)
# Instalado em: /var/lib/music-server-installer/cloud-backup.conf
# Gerado por: sudo ./setup-cloud-backup.sh
#
# Não espelha arquivos soltos (já estão no HD / Google Fotos).
# Sobe snapshots restic (recomendado) ou *.zip datados.

# Remote rclone (nome criado em "rclone config", ex.: gdrive)
RCLONE_REMOTE="gdrive"

# Pasta no remote (cria se não existir)
RCLONE_PATH="music-server-backup"

# O que subir: restic | zip
#   restic — repositório de snapshots (criptografado, deduplicado, histórico)
#   zip    — arquivos *.zip datados de Musicas/Fotos
BACKUP_PAYLOAD="restic"

# Origens (modo zip; no modo restic usa a config do restic)
BACKUP_MUSIC=true
BACKUP_PHOTOS=true
# Incluir Downloads do qBittorrent? (geralmente não)
BACKUP_DOWNLOADS=false

# Modo rclone ao enviar: copy | sync
# No payload restic (repo local), o script força sync do repositório.
RCLONE_MODE="copy"

# --- Payload restic ---
# Rodar backup-restic.sh antes de enviar o repo?
RUN_RESTIC_FIRST=true
# Subpasta no remote para o repositório
RESTIC_CLOUD_SUBDIR="restic-repo"

# --- Payload zip ---
ZIP_STAGING_DIR=""
# Quantos zips manter localmente / na nuvem (por label: musicas, fotos)
ZIP_KEEP_LOCAL=1
ZIP_KEEP_REMOTE=3
# Nível zip 0–9 (0=store sem recompressão — ideal para mp3/jpg)
ZIP_COMPRESSION=0

# Agendamento (systemd timer) — formato OnCalendar
BACKUP_SCHEDULE="*-*-* 03:00:00"

# Usuário que possui o rclone.conf (OAuth Google Drive)
BACKUP_USER=""

# Logs
BACKUP_LOG_DIR="/var/lib/music-server-installer/logs"

# Opções rclone extras (espaço-separadas)
RCLONE_EXTRA_OPTS="--fast-list --checkers 8 --transfers 4 --tpslimit 8 --retries 5 --low-level-retries 10"
